<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Manager - Ingredients</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <h1>Ingredients Module</h1>

    <!-- Add Ingredient Form -->
    <div class="card">
      <h3>Add New Ingredient</h3>
      <form id="ingredient-form">
        <div class="grid" style="grid-template-columns: repeat(2, 1fr);">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" class="form-control" required placeholder="Milk">
          </div>
          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" class="form-control" required placeholder="1">
          </div>
          <div class="form-group">
            <label for="expiry_date">Expiry Date</label>
            <input type="date" id="expiry_date" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" class="form-control" placeholder="Dairy">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Ingredient</button>
      </form>
    </div>

    <!-- Ingredients List -->
    <div class="card">
      <h3>Stock Inventory</h3>
      <div id="ingredients-list" class="grid"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ingredients.js"></script>
</body>
</html>
