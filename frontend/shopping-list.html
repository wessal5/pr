<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Manager - Shopping List</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <h1>Shopping List Module</h1>

    <div class="card">
      <h3>Add Item Manually</h3>
      <form id="shopping-form">
        <div class="grid" style="grid-template-columns: 2fr 1fr 1fr;">
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" class="form-control" required placeholder="Milk">
          </div>
          <div class="form-group">
            <label for="item-type">Type</label>
            <select id="item-type" class="form-control">
              <option value="essential">Essential</option>
              <option value="optional">Optional</option>
            </select>
          </div>
          <div class="form-group" style="display: flex; align-items: flex-end;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add Item</button>
          </div>
        </div>
      </form>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Essential Items</h3>
        <div id="essential-list"></div>
      </div>
      <div class="card">
        <h3>Optional Items</h3>
        <div id="optional-list"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/shoppingList.js"></script>
</body>
</html>
